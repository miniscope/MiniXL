name: MiniXL Optical Assembly
version: 0.1.0
description: |
  Achromatic fluorescence imaging optics with 3.5 mm FOV, ~3 um resolution,
  and 1.9 mm working distance. Modular design supports cortical imaging
  through cranial windows and deep brain imaging with implanted probes.

